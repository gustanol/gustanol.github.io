<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#F5F0E8"/>

  <!-- Chip body -->
  <rect x="96" y="96" width="320" height="320" rx="24" fill="none" stroke="#1F2A38" stroke-width="8"/>

  <!-- Chip pins (top) -->
  <g stroke="#1F2A38" stroke-width="8">
    <line x1="160" y1="64" x2="160" y2="96"/>
    <line x1="224" y1="64" x2="224" y2="96"/>
    <line x1="288" y1="64" x2="288" y2="96"/>
    <line x1="352" y1="64" x2="352" y2="96"/>
  </g>

  <!-- Chip pins (bottom) -->
  <g stroke="#1F2A38" stroke-width="8">
    <line x1="160" y1="416" x2="160" y2="448"/>
    <line x1="224" y1="416" x2="224" y2="448"/>
    <line x1="288" y1="416" x2="288" y2="448"/>
    <line x1="352" y1="416" x2="352" y2="448"/>
  </g>

  <!-- Chip pins (left) -->
  <g stroke="#1F2A38" stroke-width="8">
    <line x1="64" y1="160" x2="96" y2="160"/>
    <line x1="64" y1="224" x2="96" y2="224"/>
    <line x1="64" y1="288" x2="96" y2="288"/>
    <line x1="64" y1="352" x2="96" y2="352"/>
  </g>

  <!-- Chip pins (right) -->
  <g stroke="#1F2A38" stroke-width="8">
    <line x1="416" y1="160" x2="448" y2="160"/>
    <line x1="416" y1="224" x2="448" y2="224"/>
    <line x1="416" y1="288" x2="448" y2="288"/>
    <line x1="416" y1="352" x2="448" y2="352"/>
  </g>

  <!-- Magnifying glass -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="#3A6EA5" stroke-width="12"/>
  <line x1="330" y1="330" x2="410" y2="410" stroke="#3A6EA5" stroke-width="16" stroke-linecap="round"/>

  <!-- Text -->
  <text x="256" y="275" text-anchor="middle" font-size="72" font-family="Arial, Helvetica, sans-serif" fill="#1F2A38" font-weight="bold">
    x86
  </text>
</svg>
