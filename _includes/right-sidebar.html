<style>
.page-info {
	margin-bottom: 1rem;
	font-size: 0.85rem;
	color: var(--muted);
	padding-bottom: 1rem;
	border-bottom: var(--border);
}

.reading-time {
	margin-bottom: 0.5rem;
}

/* Tags */
.tags {
	display: flex;
	flex-wrap: wrap;
	gap: 0.3rem;
}

.tag {
	border: var(--border);
	padding: 0.1rem 0.4rem;
	font-size: 0.75rem;
	color: var(--muted);
	text-decoration: none;
	border-radius: 1rem;
}

.tag:hover {
	color: var(--fg);
	border-color: var(--fg);
	text-decoration: none;
}

/* --- TOC --- */
.toc {
	height: auto;
	font-size: 0.9rem;
	color: var(--muted);
	overflow-y: auto;
}

.toc p {
	top: 0;
	position: sticky;
	background: var(--bg);
	z-index: 10;
	width: 100%;
}

.toc a.active {
  	color: var(--fg);
  	font-weight: bold;
}

.toc h2 {
	font-size: 0.9rem;
	margin-bottom: 0.5rem;
}

.toc h3 {
	font-size: 0.8rem;
}

.toc h4 {
	font-size: 0.7rem;
}

.toc ul {
	list-style: none;
}

.toc li {
	margin: 0.25rem 0;
}
</style>

<aside class="sidebar">
	<div class="page-info">
		{% assign words = content | number_of_words %}
		{% assign minutes = words | divided_by: 200 %}
		{% if minutes == 0 %}
			{% assign minutes = 1 %}
		{% endif %}

		<div class="reading-time">
			{{ minutes }} min read
		</div>

		{% if page.tags %}
			<div class="tags">
				{% for tag in page.tags %}
					<a href="/tags#{{ tag }}" class="tag">{{ tag }}</a>
				{% endfor %}
			</div>
		{% endif %}
	</div>

	<div class="toc" id="toc">
		<p>Table of Contents</p>
	</div>
</aside>
