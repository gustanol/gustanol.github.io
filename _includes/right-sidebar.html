<style>
#right-sidebar {
	border-left: var(--border);
}

.page-info {
	margin-bottom: 1rem;
	font-size: 0.85rem;
	color: var(--muted);
	padding-bottom: 1rem;
	border-bottom: var(--border);
}

.reading-time {
	margin-bottom: 0.5rem;
}

/* Tags */
.tags {
	display: flex;
	flex-wrap: wrap;
	gap: 0.3rem;
}

.tag {
	border: var(--border);
	padding: 0.1rem 0.4rem;
	font-size: 0.75rem;
	color: var(--muted);
	text-decoration: none;
	border-radius: 1rem;
}

.tag:hover {
	color: var(--fg);
	border-color: var(--fg);
	text-decoration: none;
}

/* --- TOC --- */
.toc {
	height: auto;
	font-size: 0.9rem;
	color: var(--muted);
	overflow-y: auto;
}

.toc p {
	top: 0;
	position: sticky;
	background: inherit;
	z-index: 10;
	width: 100%;
	padding-bottom: 0.5rem;
	margin: 0;
}

.toc a.active {
  	color: var(--fg);
  	font-weight: bold;
}

/* H2 */
.toc li.level-h2 {
  padding-left: 0;
}

/* H3 */
.toc li.level-h3 {
  padding-left: 1rem;
  font-size: 0.92em;
}

/* H4 */
.toc li.level-h4 {
  padding-left: 2rem;
  font-size: 0.88em;
}

.toc ul {
	list-style: none;
}

.toc li {
	margin: 0.25rem 0;
}

@media (max-width: 768px) {
	.toc p {
		background: rgba(0,0,0,0.9);
	}
}
</style>

<aside class="sidebar" id="right-sidebar">
	<div class="page-info">
		{% assign words = content | number_of_words %}
		{% assign minutes = words | divided_by: 200 %}
		{% if minutes == 0 %}
			{% assign minutes = 1 %}
		{% endif %}

		<div class="reading-time">
			{{ minutes }} min read
		</div>

		{% if page.tags %}
			<div class="tags">
				{% for tag in page.tags %}
					<a href="/tags#{{ tag }}" class="tag">{{ tag }}</a>
				{% endfor %}
			</div>
		{% endif %}
	</div>

	<div class="toc" id="toc">
		<p>Table of Contents</p>
	</div>
</aside>
