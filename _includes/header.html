<style>

/* Header */
.header {
	position: sticky;
	top: 0;
	background: var(--bg);
	color: var(--fg);
	width: 100%;
	height: 3.7rem;
	border-bottom: var(--border);
	display: flex;
	justify-content: space-evenly;
	align-items: center;
	padding: 0.8rem;
	z-index: 50;
}

.header > a {
	color: inherit;
	font-weight: bold;
}

/* Search */
.search {
	padding: 0.5rem;
	background: #0b0d10;
	border: var(--border);
	border-radius: 1rem;
	color: var(--fg);
	flex-basis: 60%;
}

.header > svg {
	width: 2rem;
	height: 100%;
}
</style>

<header class="header">
	<svg id="menu-toggle" class="icon hamburger-toggle">
		<use href="#icon-menu">
	</svg>

	<a href="">{{ page.short_title }}</a>

	<!-- Search label -->
	<input id="search-input" class="search" placeholder="Search..." />

	<svg id="toc-toggle" class="icon hamburger-toggle">
		<use href="#icon-toc">
	</svg>
</header>

<div id="search-overlay" class="search-overlay hidden">
	<div class="search-box">
		<span>Results found</span>
		<ul id="search-results"></ul>
	</div>
</div>
